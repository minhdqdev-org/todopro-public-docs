name: ci-prod

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-prod
  cancel-in-progress: true

env:
  HARBOR_REGISTRY: harbor.internal.minhdq.dev
  HARBOR_PROJECT: minhdqdev
  IMAGE_NAME: todopro-public-docs

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: [self-hosted, minhdqdev-org]
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Validate docs build
        run: |
          uv sync --frozen --no-dev
          uv run zensical build --clean

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME || env.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD || env.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ steps.extract_version.outputs.version }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "Published \`${{ env.IMAGE_NAME }}:${{ steps.extract_version.outputs.version }}\` to Harbor :rocket:" >> "$GITHUB_STEP_SUMMARY"
